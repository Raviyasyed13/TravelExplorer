<!DOCTYPE html>
<html>
<head>
<title>Travel Feedback</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
}

header{
background:#2c5364;
color:white;
padding:15px;
text-align:center;
}

.container{
width:600px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.row{
display:flex;
gap:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
height:120px;
}

.star{
font-size:25px;
cursor:pointer;
color:#ccc;
}

.active{
color:gold;
}

.circle{
display:inline-block;
width:35px;
height:35px;
line-height:35px;
text-align:center;
border:1px solid #999;
border-radius:50%;
cursor:pointer;
margin-right:5px;
}

.circle.active{
background:#2c5364;
color:white;
}

button{
background:#2c5364;
color:white;
padding:12px;
border:none;
width:100%;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1e3c72;
}

</style>

</head>

<body>

<header>
<h2>Client Trip Feedback</h2>
</header>

<div class="container">

<label>Full Name</label>
<div class="row">
<input type="text" id="fname" placeholder="First Name">
<input type="text" id="lname" placeholder="Last Name">
</div>

<label>Email</label>
<input type="email" id="email" placeholder="example@gmail.com">

<label>Overall Satisfaction</label>
<div>
<span class="star" onclick="setStars(1)">★</span>
<span class="star" onclick="setStars(2)">★</span>
<span class="star" onclick="setStars(3)">★</span>
<span class="star" onclick="setStars(4)">★</span>
<span class="star" onclick="setStars(5)">★</span>
</div>

<label>How About the Tour?</label>
<div>
<span class="circle" onclick="setTour(1)">1</span>
<span class="circle" onclick="setTour(2)">2</span>
<span class="circle" onclick="setTour(3)">3</span>
<span class="circle" onclick="setTour(4)">4</span>
<span class="circle" onclick="setTour(5)">5</span>
</div>

<label>How Can We Improve?</label>
<textarea id="message"></textarea>

<button onclick="submitFeedback()">Submit</button>

</div>

<script>

let starRating=0;
let tourRating=0;

function setStars(n){
starRating=n;
let stars=document.querySelectorAll(".star");

stars.forEach((s,i)=>{
s.classList.remove("active");
if(i<n) s.classList.add("active");
});
}

function setTour(n){
tourRating=n;
let circles=document.querySelectorAll(".circle");

circles.forEach((c,i)=>{
c.classList.remove("active");
if(i==n-1) c.classList.add("active");
});
}

function submitFeedback(){

let fname=document.getElementById("fname").value;
let lname=document.getElementById("lname").value;
let email=document.getElementById("email").value;
let msg=document.getElementById("message").value;

if(fname=="" || starRating==0){
alert("Fill required fields");
return;
}

let data=JSON.parse(localStorage.getItem("feedback")) || [];

data.push({
name: fname+" "+lname,
email: email,
rating: starRating,
tour: tourRating,
message: msg
});

localStorage.setItem("feedback",JSON.stringify(data));

alert("Feedback Submitted");

window.location.href="reviews.html";

}

</script>

</body>
</html>
