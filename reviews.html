<!DOCTYPE html>
<html>
<head>
<title>Reviews</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
margin:0;
}

header{
background:#2c5364;
color:white;
padding:15px;
text-align:center;
}

.container{
width:90%;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:15px;
margin:15px 0;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.star{
color:gold;
font-size:18px;
}

.avg{
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<header>
<h2>User Reviews</h2>
</header>

<div class="container">

<div id="average" class="avg"></div>

<div id="list"></div>

</div>

<script>

let data=JSON.parse(localStorage.getItem("feedback")) || [];

let list=document.getElementById("list");

let total=0;

data.forEach(d=>{

total+=Number(d.rating);

let stars="";

for(let i=0;i<d.rating;i++){
stars+="★";
}

let div=document.createElement("div");

div.className="card";

div.innerHTML=
"<h3>"+d.name+"</h3>"+
"<div class='star'>"+stars+"</div>"+
"<p>"+d.message+"</p>";

list.appendChild(div);

});

if(data.length>0){
document.getElementById("average").innerHTML=
"Average Rating : "+(total/data.length).toFixed(1)+" ⭐";
}

</script>

</body>
</html>
