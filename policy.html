<!DOCTYPE html>
<html>
<head>
<title>Terms & Policy</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
margin:0;
}

.container{
width:600px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#2c5364;
color:white;
padding:12px;
border:none;
width:100%;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

</style>

</head>

<body>

<div class="container">

<h2>Terms & Conditions</h2>

<ul>
<li>Customer must carry valid ID proof</li>
<li>Payment must be completed before travel</li>
<li>Package once booked cannot be cancelled</li>
<li>Company not responsible for personal loss</li>
<li>Travel dates may change due to weather</li>
</ul>

<label>
<input type="checkbox" id="agree">
 I Accept Terms & Conditions
</label>

<br><br>

<button onclick="confirmBooking()">Confirm Booking</button>

</div>

<script>

function confirmBooking(){

if(!document.getElementById("agree").checked){
alert("Please accept terms");
return;
}

alert("Booking Successful 🎉");

window.location.href="index.html";

}

</script>

</body>
</html>
